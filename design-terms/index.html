<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 용어 사전 — Design Terms Glossary</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --ink: #1A1815;
    --ink-soft: #6B6560;
    --accent: #FF6B35;
    --accent-soft: #FFF0E9;
    --lavender: #C5BBDD;
    --line: #E8E3DC;
    --chip-bg: #F1EDE7;
    --mark-bg: #FFE3B3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161412;
      --surface: #201D1A;
      --ink: #F0EDE9;
      --ink-soft: #9B948D;
      --accent: #FF7B48;
      --accent-soft: #3A2418;
      --line: #34302B;
      --chip-bg: #2B2723;
      --mark-bg: #5C4415;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 24px 96px; }

  header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  header h1 .en { color: var(--accent); }
  header p.sub { color: var(--ink-soft); margin-top: 6px; font-size: 14px; }

  .searchbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 20px 0 12px;
    margin-top: 24px;
  }
  .searchbox {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    transition: border-color .15s;
  }
  .searchbox:focus-within { border-color: var(--accent); }
  .searchbox svg { flex: none; color: var(--ink-soft); }
  .searchbox input {
    flex: 1; border: none; outline: none; background: transparent;
    font: inherit; font-size: 16px; color: var(--ink);
  }
  .search-hint { font-size: 12.5px; color: var(--ink-soft); margin-top: 8px; padding-left: 4px; }
  .search-hint b { color: var(--accent); font-weight: 600; cursor: pointer; }

  .cats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .cat {
    font: inherit; font-size: 13.5px; font-weight: 600;
    padding: 7px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft);
    cursor: pointer; transition: all .12s;
  }
  .cat:hover { border-color: var(--accent); color: var(--accent); }
  .cat.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .cat .n { opacity: .55; font-weight: 500; margin-left: 4px; font-size: 12px; }

  .meta-row { display: flex; align-items: baseline; justify-content: space-between; margin: 22px 0 14px; }
  .count { font-size: 13px; color: var(--ink-soft); }
  .count b { color: var(--accent); }

  .group-title {
    font-size: 15px; font-weight: 800; letter-spacing: -0.01em;
    margin: 30px 0 12px; display: flex; align-items: center; gap: 10px;
  }
  .group-title::after { content: ""; flex: 1; border-top: 1.5px dashed var(--line); }
  .group-title .gn { color: var(--accent); font-size: 12px; font-weight: 700; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .card .names { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .card .ko { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .card .en { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .card .def { font-size: 14px; color: var(--ink); opacity: .88; }
  .card .aliases { font-size: 12.5px; color: var(--ink-soft); }
  .card .aliases b { font-weight: 600; color: var(--accent); }
  .card .rel { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .card .rel span {
    font-size: 12px; padding: 3px 9px; border-radius: 999px;
    background: var(--chip-bg); color: var(--ink-soft); cursor: pointer;
  }
  .card .rel span:hover { background: var(--accent-soft); color: var(--accent); }
  mark { background: var(--mark-bg); color: inherit; border-radius: 3px; padding: 0 1px; }

  .empty { text-align: center; padding: 72px 0; color: var(--ink-soft); }
  .empty .big { font-size: 40px; }
  .empty p { margin-top: 10px; font-size: 14px; }

  footer { margin-top: 64px; padding-top: 20px; border-top: 1.5px dashed var(--line);
    font-size: 12.5px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>디자인 용어 사전 <span class="en">Design Terms Glossary</span></h1>
    <p class="sub">이름이 기억 안 나도 괜찮습니다. 생김새·상황을 설명하는 키워드로 검색하세요.</p>
  </header>

  <div class="searchbar">
    <div class="searchbox">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="용어, 영문, 동의어, 설명 키워드로 검색 (예: 박스 선 연결, 자간, 부서별 가로줄)" autocomplete="off">
    </div>
    <div class="search-hint">이렇게 찾아보세요 → <b data-q="박스를 선으로 연결">박스를 선으로 연결</b> · <b data-q="글자 사이 간격">글자 사이 간격</b> · <b data-q="부서별 가로줄">부서별 가로줄</b> · <b data-q="흐릿한 유리">흐릿한 유리</b></div>
    <div class="cats" id="cats"></div>
  </div>

  <div class="meta-row"><div class="count" id="count"></div></div>
  <div id="results"></div>

  <footer>
    용어 데이터는 이 파일 안의 <code>TERMS</code> 배열에서 관리합니다. 새 용어는 한글명·영문명·동의어·설명·검색 키워드·관련어를 채워 추가하면 즉시 검색에 반영됩니다.
  </footer>
</div>

<script>
const CATEGORIES = [
  "타이포그래피", "레이아웃·그리드", "컬러", "그래픽·이미지",
  "UI·UX", "다이어그램·시각화", "브랜딩", "모션·영상"
];

const TERMS = [

 def:"글자 획 끝에 돌기(세리프)가 있는 서체 계열. 클래식하고 신뢰감 있는 인상. 본문 인쇄물에 강함.",
 kw:["획 끝 장식","돌기 있는 글꼴","명조","전통적인 폰트"], rel:["산세리프","엑스하이트"]},
{ko:"산세리프", en:"Sans-serif", al:["고딕계열","돋움계열"], cat:"타이포그래피",

 kw:["돌기 없는 글꼴","고딕","깔끔한 폰트","모던 서체"], rel:["세리프","웨이트"]},
{ko:"커닝", en:"Kerning", al:["글자쌍 간격 조정"], cat:"타이포그래피",
 def:"특정 두 글자 사이의 간격을 개별적으로 조정하는 것. 'AV'처럼 시각적으로 벌어져 보이는 쌍을 좁힘.",
 kw:["두 글자 사이 간격","글자 붙이기","로고 글자 간격 미세조정"], rel:["자간(트래킹)","행간(레딩)"]},

 kw:["글자 사이 간격","글자 벌리기","텍스트 간격 전체"], rel:["커닝","행간(레딩)"]},

 def:"줄과 줄 사이의 세로 간격. 본문 가독성의 절반을 결정. 보통 폰트 크기의 1.4~1.7배.",

{ko:"저스티파이", en:"Justify", al:["양끝맞춤","양쪽정렬"], cat:"타이포그래피",

// ─── 검색·렌더링 ───
const $q = document.getElementById("q");
const $cats = document.getElementById("cats");
const $results = document.getElementById("results");
const $count = document.getElementById("count");
let activeCat = null;

function norm(s){ return s.toLowerCase().replace(/\s+/g," ").trim(); }

function haystack(t){
  return norm([t.ko, t.en, ...(t.al||[]), t.def, ...(t.kw||[])].join(" "));
}

function matches(t, tokens){
  const h = haystack(t);
  return tokens.every(tok => h.includes(tok));
}

function hl(text, tokens){
  if(!tokens.length) return text;
  let out = text;
  tokens.forEach(tok=>{
    if(tok.length < 1) return;
    const esc = tok.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    out = out.replace(new RegExp("("+esc+")","gi"),"<mark>$1</mark>");
  });
  return out;
}

function render(){
  const raw = norm($q.value);
  const tokens = raw ? raw.split(" ") : [];
  let list = TERMS.filter(t => (!activeCat || t.cat === activeCat));
  if(tokens.length) list = list.filter(t => matches(t, tokens));

  $count.innerHTML = `<b>${list.length}</b>개 용어 ${activeCat ? `· ${activeCat}` : "· 전체"} ${raw ? `· "${$q.value}" 검색` : ""}`;

  if(!list.length){
    $results.innerHTML = `<div class="empty"><div class="big">🔍</div><p>검색 결과가 없습니다.<br>더 짧은 키워드로, 혹은 생김새를 묘사하는 말로 시도해 보세요.</p></div>`;
    return;
  }

  // 카테고리 순서대로 그룹핑
  let html = "";
  CATEGORIES.forEach((cat, i)=>{
    const group = list.filter(t=>t.cat===cat);
    if(!group.length) return;
    html += `<div class="group-title"><span class="gn">${String(i+1).padStart(2,"0")}</span>${cat}</div><div class="grid">`;
    group.forEach(t=>{
      html += `<div class="card">
        <div class="names"><span class="ko">${hl(t.ko,tokens)}</span><span class="en">${hl(t.en,tokens)}</span></div>
        <div class="def">${hl(t.def,tokens)}</div>
        ${t.al && t.al.length ? `<div class="aliases"><b>=</b> ${hl(t.al.join(" · "),tokens)}</div>` : ""}
        ${t.rel && t.rel.length ? `<div class="rel">${t.rel.map(r=>`<span data-term="${r}">→ ${r}</span>`).join("")}</div>` : ""}
      </div>`;
    });
    html += `</div>`;
  });
  $results.innerHTML = html;
}

function renderCats(){
  const counts = {};
  TERMS.forEach(t=>counts[t.cat]=(counts[t.cat]||0)+1);
  $cats.innerHTML = `<button class="cat ${!activeCat?"on":""}" data-cat="">전체<span class="n">${TERMS.length}</span></button>` +
    CATEGORIES.map(c=>`<button class="cat ${activeCat===c?"on":""}" data-cat="${c}">${c}<span class="n">${counts[c]||0}</span></button>`).join("");
}

$q.addEventListener("input", render);
$cats.addEventListener("click", e=>{
  const btn = e.target.closest(".cat");
  if(!btn) return;
  activeCat = btn.dataset.cat || null;
  renderCats(); render();
});
$results.addEventListener("click", e=>{
  const chip = e.target.closest("[data-term]");
  if(!chip) return;
  activeCat = null; $q.value = chip.dataset.term;
  renderCats(); render();
  window.scrollTo({top:0, behavior:"smooth"});
});
document.querySelector(".search-hint").addEventListener("click", e=>{
  const b = e.target.closest("[data-q]");
  if(!b) return;
  activeCat = null; $q.value = b.dataset.q;
  renderCats(); render();
});

renderCats(); render();
</script>

</html>
