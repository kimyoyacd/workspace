<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>업무 로그 — 하이브랩 MX센터</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;padding:20px;
    background:#fcfcfb;color:#1f1d1a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;
    max-width:1200px;margin:0 auto;
  }
  .header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:30px;}
  h1{font-size:28px;font-weight:800;margin:0;}
  .meta{font-size:14px;color:#6b6862;text-align:right;}

  .tabs{display:flex;gap:6px;margin-bottom:20px;}
  .tab{
    padding:8px 16px;
    border:1px solid #eceae4;
    border-radius:20px;
    background:#fff;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    color:#6b6862;
  }
  .tab.active{background:#1f1d1a;color:#fff;border-color:#1f1d1a;}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:30px;}
  .stat-card{
    background:#fff;
    border:1px solid #eceae4;
    border-radius:12px;
    padding:16px;
    text-align:center;
  }
  .stat-label{font-size:12px;color:#6b6862;margin-bottom:8px;}
  .stat-value{font-size:24px;font-weight:800;}

  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:12px;background:#fff;border-radius:8px;border:1px solid #eceae4;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;}
  .legend-dot{width:12px;height:12px;border-radius:50%;}

  .grid-container{background:#fff;border:1px solid #eceae4;border-radius:12px;overflow-x:auto;padding:12px;}
  table{border-collapse:separate;border-spacing:4px;width:100%;}
  th{font-size:13px;font-weight:700;padding:8px;text-align:center;color:#1f1d1a;}
  th .day{font-size:11px;color:#a29e96;display:block;margin-top:2px;}
  td{padding:8px;text-align:center;font-size:12px;}
  td.time{text-align:right;color:#a29e96;width:50px;white-space:nowrap;padding-right:12px;}
  .cell{
    height:48px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid #eceae4;
    font-weight:600;
    font-size:12px;
  }
  .cell.filled{border:none;color:#fff;}

  .chart{background:#fff;border:1px solid #eceae4;border-radius:12px;padding:20px;margin-top:20px;}
  .chart-title{font-size:16px;font-weight:800;margin-bottom:16px;}
  .bar-row{display:grid;grid-template-columns:80px 1fr 60px;align-items:center;gap:12px;margin-bottom:12px;}
  .bar-name{font-size:13px;text-align:right;color:#1f1d1a;}
  .bar-track{background:#f4f2ec;border-radius:6px;height:24px;position:relative;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:11px;font-weight:700;}
  .bar-pct{font-size:12px;color:#6b6862;}

  .footer{margin-top:20px;padding:12px;background:#f9f8f7;border-radius:8px;font-size:12px;color:#a29e96;}
</style>
</head>
<body>

<div class="header">
  <h1>업무 로그</h1>
  <div class="meta">2026 · 하이브랩 MX센터<br>김효정(실장)</div>
</div>

<div class="tabs">
  <div class="tab active">W27 (6/29~7/5)</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">기록된 시간</div>
    <div class="stat-value">12h</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">세일즈/BD</div>
    <div class="stat-value">8h</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">미팅</div>
    <div class="stat-value">2h</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">문서</div>
    <div class="stat-value">2h</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#9FE1CB;border:1px solid #4fbf9a"></span>세일즈/BD</div>
  <div class="legend-item"><span class="legend-dot" style="background:#FAC775;border:1px solid #e0a23d"></span>미팅</div>
  <div class="legend-item"><span class="legend-dot" style="background:#B5D4F4;border:1px solid #5f9ce0"></span>문서/리포트</div>
  <div class="legend-item"><span class="legend-dot" style="background:#CECBF6;border:1px solid #7d74d6"></span>AI작업</div>
</div>

<div class="grid-container">
  <table>
    <thead>
      <tr>
        <th></th>
        <th>월<span class="day">6/29</span></th>
        <th>화<span class="day">6/30</span></th>
        <th>수<span class="day">7/1</span></th>
        <th>목<span class="day">7/2</span></th>
        <th>금<span class="day">7/3</span></th>
        <th>토<span class="day">7/4</span></th>
        <th>일<span class="day">7/5</span></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="time">10–12</td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell filled" style="background:#FAC775;color:#633806">미팅</div></td>
        <td><div class="cell filled" style="background:#9FE1CB;color:#085041">세일즈</div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
      </tr>
      <tr>
        <td class="time">12–14</td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell filled" style="background:#9FE1CB;color:#085041">세일즈</div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
      </tr>
      <tr>
        <td class="time">14–16</td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell filled" style="background:#9FE1CB;color:#085041">세일즈</div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
      </tr>
      <tr>
        <td class="time">16–18</td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell filled" style="background:#B5D4F4;color:#0C447C">문서</div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
      </tr>
      <tr>
        <td class="time">18–20</td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell filled" style="background:#B5D4F4;color:#0C447C">문서</div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
        <td><div class="cell"></div></td>
      </tr>
    </tbody>
  </table>
</div>

<div class="chart">
  <div class="chart-title">카테고리별 시간</div>
  <div class="bar-row">
    <div class="bar-name">세일즈/BD</div>
    <div class="bar-track"><div class="bar-fill" style="width:67%;background:#9FE1CB;color:#085041">8h</div></div>
    <div class="bar-pct">67%</div>
  </div>
  <div class="bar-row">
    <div class="bar-name">문서</div>
    <div class="bar-track"><div class="bar-fill" style="width:17%;background:#B5D4F4;color:#0C447C">2h</div></div>
    <div class="bar-pct">17%</div>
  </div>
  <div class="bar-row">
    <div class="bar-name">미팅</div>
    <div class="bar-track"><div class="bar-fill" style="width:17%;background:#FAC775;color:#633806">2h</div></div>
    <div class="bar-pct">17%</div>
  </div>
</div>

<div class="footer">
  업무 블록: 각 셀은 2시간 기준 · 계획 항목은 미표기 · 실제 완료 후 데이터 업데이트
</div>

</body>
</html>
