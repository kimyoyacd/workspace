<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>업무 로그 대시보드 — 하이브랩 MX센터</title>
<style>
  :root{
    --surface:#fcfcfb; --card:#ffffff; --line:#eceae4;
    --ink:#1f1d1a; --ink2:#6b6862; --ink3:#a29e96; --accent:#2f6fed;
    --radius:14px; --shadow:0 1px 2px rgba(0,0,0,.04),0 1px 8px rgba(0,0,0,.03);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;padding:28px 30px 60px;max-width:1240px;margin:0 auto}
  h1{font-size:30px;font-weight:800;margin:0;letter-spacing:-.5px}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .period{color:var(--ink2);font-size:14px;text-align:right;line-height:1.5;padding-top:8px}
  /* view tabs */
  .tabs{display:flex;gap:6px;margin:22px 0 4px}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--ink2);
    padding:8px 18px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .tab:hover{border-color:#d8d5cd}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .nav{display:flex;align-items:center;gap:10px;margin:16px 0 8px}
  .nav button{border:1px solid var(--line);background:var(--card);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;color:var(--ink2)}
  .nav .label{font-size:16px;font-weight:700;min-width:180px}
  .nav .hint{font-size:12.5px;color:var(--ink3);margin-left:auto}
  /* stat tiles */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:16px 0 22px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
  .tile .k{font-size:13px;color:var(--ink2);margin-bottom:8px}
  .tile .v{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .tile .v small{font-size:14px;font-weight:600;color:var(--ink2)}
  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin:0 0 16px;padding:12px 4px}
  .lg{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink)}
  .dot{width:10px;height:10px;border-radius:50%}
  /* card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:8px;box-shadow:var(--shadow);overflow:hidden}
  .sec-title{font-size:19px;font-weight:800;margin:30px 0 12px}
  .sec-title small{font-size:13px;font-weight:600;color:var(--ink3);margin-left:8px}
  /* weekly grid */
  .gridscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.grid{border-collapse:separate;border-spacing:6px;width:100%;min-width:660px}
  table.grid th{font-weight:700;font-size:14px;color:var(--ink);padding-bottom:2px}
  table.grid th .d{display:block;font-size:12px;color:var(--ink3);font-weight:600}
  table.grid th.today .d,table.grid th.today{color:var(--accent)}
  table.grid td.time{font-size:12.5px;color:var(--ink3);text-align:right;padding-right:6px;white-space:nowrap;width:52px}
  .cell{height:52px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;position:relative;font-size:14px;font-weight:600}
  .cell.today{border-color:var(--accent);border-width:2px}
  .cell.filled{border:none}
  .cell .adot{position:absolute;top:7px;right:8px;width:6px;height:6px;border-radius:50%;opacity:.65}
  .cell[data-memo]:hover::after{content:attr(data-memo);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:#26241f;color:#fff;font-size:12px;font-weight:500;padding:6px 10px;border-radius:8px;white-space:nowrap;z-index:20;box-shadow:0 4px 14px rgba(0,0,0,.18)}
  .foot{font-size:12.5px;color:var(--ink3);margin:12px 2px 0}
  .foot b{color:var(--accent);font-weight:700}
  /* bar chart */
  .bars{display:flex;flex-direction:column;gap:12px;padding:16px 8px 8px}
  .bar-row{display:grid;grid-template-columns:96px 1fr 52px;align-items:center;gap:12px}
  .bar-row .name{font-size:13.5px;color:var(--ink);text-align:right}
  .bar-track{background:#f4f2ec;border-radius:8px;height:26px;position:relative;overflow:hidden}
  .bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:12.5px;font-weight:700;min-width:26px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .bar-row .pct{font-size:13px;color:var(--ink2);font-weight:600;text-align:right}
  /* stacked weekly/monthly */
  .stackwrap{display:flex;gap:22px;align-items:flex-end;height:230px;padding:20px 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .stackcol{flex:1;min-width:40px;display:flex;flex-direction:column-reverse;align-items:center;height:100%;justify-content:flex-start}
  .stackcol .col{width:60%;max-width:64px;display:flex;flex-direction:column-reverse;gap:2px;justify-content:flex-start}
  .seg{border-radius:4px;min-height:2px}
  .stackcol .cap{margin-top:8px;font-size:12.5px;color:var(--ink2);font-weight:600;text-align:center}
  .stackcol .tot{font-size:12px;color:var(--ink3);margin-bottom:4px}
  /* insight */
  .insight{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);margin-top:24px}
  .insight h3{margin:0 0 10px;font-size:15px}
  .insight li{font-size:14px;color:var(--ink);line-height:1.7;margin:2px 0}
  .warn{color:#9a3412}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.tiles{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
  @media(max-width:640px){
    body{padding:16px 13px 44px}
    h1{font-size:22px}
    .head{gap:6px}
    .period{text-align:left;padding-top:2px;font-size:13px}
    .tabs{margin:16px 0 2px}.tab{padding:7px 14px;font-size:13px}
    .nav{flex-wrap:wrap;gap:8px}
    .nav .label{font-size:15px;min-width:0}
    .nav .hint{width:100%;margin-left:0;order:9;font-size:11.5px}
    .tiles{gap:10px;margin:14px 0 18px}
    .tile{padding:14px 15px;border-radius:12px}
    .tile .v{font-size:21px}.tile .k{font-size:12px}
    .legend{gap:7px 12px;padding:10px 2px}.lg{font-size:12.5px}
    .sec-title{font-size:17px;margin:24px 0 10px}
    .bar-row{grid-template-columns:66px 1fr 40px;gap:8px}
    .bar-row .name{font-size:11.5px}
    .stackwrap{gap:14px;height:200px}
    .insight{padding:15px 16px}.insight li{font-size:13px}
  }
  @media(hover:none){ .cell[data-memo]:active::after{content:attr(data-memo);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#26241f;color:#fff;font-size:12px;padding:6px 10px;border-radius:8px;white-space:nowrap;z-index:20} }
</style>
</head>
<body data-palette="#CECBF6,#F5C4B3,#F4C0D1,#B5D4F4,#FAC775,#9FE1CB,#C0DD97">
<div class="head">
  <div><h1>업무 로그 대시보드</h1></div>
  <div class="period" id="period">2026 · 하이브랩 MX센터<br/>김효정(실장)</div>
</div>

<div class="tabs" id="tabs">
  <div class="tab on" data-view="week">주간</div>
  <div class="tab" data-view="month">월간</div>
  <div class="tab" data-view="half">반기</div>
  <div class="tab" data-view="year">연간</div>
</div>

<div class="nav" id="nav">
  <button id="prev">‹</button>
  <div class="label" id="navLabel"></div>
  <button id="next">›</button>
  <div class="hint" id="navHint"></div>
</div>

<div class="tiles" id="tiles"></div>

<div class="legend" id="legend"></div>

<div id="viewRoot"></div>

<div class="insight" id="insight"></div>

<script>
/* ── 카테고리 마스터 (고정 순서) ───────────────────────── */
const CATS = [
  {key:"AI",   name:"AI작업",     bg:"#CECBF6", fg:"#3C3489", dot:"#7d74d6"},
  {key:"견적", name:"제안/견적",  bg:"#F5C4B3", fg:"#712B13", dot:"#d98a63"},
  {key:"디자인",name:"디자인/GUI", bg:"#F4C0D1", fg:"#72243E", dot:"#d9789c"},
  {key:"문서", name:"문서/리포트",bg:"#B5D4F4", fg:"#0C447C", dot:"#5f9ce0"},
  {key:"미팅", name:"미팅",       bg:"#FAC775", fg:"#633806", dot:"#e0a23d"},
  {key:"세일즈",name:"세일즈/BD",  bg:"#9FE1CB", fg:"#085041", dot:"#4fbf9a"},
  {key:"운영", name:"운영/HR",    bg:"#C0DD97", fg:"#27500A", dot:"#8fc258"},
];
const CAT = Object.fromEntries(CATS.map(c=>[c.key,c]));
const TIMES = ["06–08","08–10","10–12","12–14","14–16","16–18","18–20","20–22","22–24"];
const DOW = ["월","화","수","목","금","토","일"];

/* ── 원천 데이터: 행 단위 로그 (하나의 2h 블록 = 한 행) ──────
   실제 입력 지점. Google 시트에서는 이 표가 '01_로그' 탭이 됩니다.
   actual:true = 실측 / false = 계획   ───────────────────────── */
const LOG = [
  // ── W26 (6/22–28) : 실제 기록 ──
  {date:"2026-06-23",s:"08–10",cat:"미팅", proj:"내부",     memo:"오전 주간회의", actual:true},
  {date:"2026-06-23",s:"10–12",cat:"운영", proj:"팀",       memo:"팀원 커피타임(팀 소통)", actual:true},
  {date:"2026-06-23",s:"12–14",cat:"미팅", proj:"내부",     memo:"점심 센터장·실장 티타임", actual:true},
  {date:"2026-06-23",s:"14–16",cat:"견적", proj:"올리브트리/코웨이", memo:"올리브트리 포폴(애니팡 머지)+코웨이 대금일정 조정 메일", actual:true},
  {date:"2026-06-23",s:"16–18",cat:"디자인",proj:"내부",    memo:"회사소개서 업데이트 컨펌+명함 인수인계", actual:true},
  {date:"2026-06-23",s:"18–20",cat:"세일즈",proj:"넷마블",  memo:"넷마블 업세일즈 고민(Claude)", actual:true},
  {date:"2026-06-24",s:"10–12",cat:"세일즈",proj:"넷마블",  memo:"업세일즈 전략 Claude 상의(11시 출근)", actual:true},
  {date:"2026-06-24",s:"12–14",cat:"세일즈",proj:"넷마블",  memo:"업세일즈 제안 문서 리서치·제작", actual:true},
  {date:"2026-06-24",s:"14–16",cat:"미팅", proj:"올리브트리",memo:"올리브트리 미팅", actual:true},
  {date:"2026-06-24",s:"16–18",cat:"미팅", proj:"내부",     memo:"SNS 브랜딩 회의(17시)", actual:true},
  {date:"2026-06-24",s:"18–20",cat:"견적", proj:"코웨이",   memo:"코웨이 수정피드백+3D 견적 대응", actual:true},
  {date:"2026-06-24",s:"20–22",cat:"견적", proj:"올리브영", memo:"올리브영 견적 수정(별개 건)", actual:true},
  {date:"2026-06-24",s:"22–24",cat:"견적", proj:"올리브영", memo:"올리브영 견적 수정(계속)", actual:true},
  // ── W26 : 계획(제안) ──
  {date:"2026-06-25",s:"10–12",cat:"세일즈",proj:"넷마블",  memo:"[계획] 업세일즈 제안 문서 마무리", actual:false},
  {date:"2026-06-25",s:"12–14",cat:"세일즈",proj:"크래프톤",memo:"[계획] 박연옥 님 메일 발송+후속", actual:false},
  {date:"2026-06-25",s:"14–16",cat:"세일즈",proj:"내부",    memo:"[계획] KPI 사업방안(KR1·KR3)", actual:false},
  {date:"2026-06-25",s:"16–18",cat:"문서", proj:"내부",     memo:"[계획] 에이전트 진행물 리뷰·정리", actual:false},
  // ▷ 이번 주부터 실제 기록을 계속 추가하세요. (월/반기/년 뷰는 로그가 쌓이면 자동 확장)
];

/* ── 날짜 파생 (주/월/반기/년) ─────────────────────────── */
function parse(d){const[y,m,dd]=d.split("-").map(Number);return new Date(y,m-1,dd);}
function isoWeek(dt){const t=new Date(dt);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-((t.getDay()+6)%7));
  const w1=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-w1)/86400000-3+((w1.getDay()+6)%7))/7);}
function mondayOf(dt){const t=new Date(dt);const off=(t.getDay()+6)%7;t.setDate(t.getDate()-off);t.setHours(0,0,0,0);return t;}
function derive(r){const dt=parse(r.date);return{...r,dt,dow:(dt.getDay()+6)%7,
  week:isoWeek(dt),month:dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0"),
  monthN:dt.getMonth()+1,year:dt.getFullYear(),half:dt.getMonth()<6?"상반기":"하반기",
  wkStart:mondayOf(dt)};}
const ROWS = LOG.map(derive);
const HRS = 2; // 블록당 시간

/* ── 집계 헬퍼 ─────────────────────────────────────────── */
function catTotals(rows){const m={};CATS.forEach(c=>m[c.key]=0);rows.forEach(r=>m[r.cat]+=HRS);return m;}
function sum(o){return Object.values(o).reduce((a,b)=>a+b,0);}
const fmtMD=dt=>(dt.getMonth()+1)+"/"+dt.getDate();

/* ── 상태 ──────────────────────────────────────────────── */
let view="week";
let weekAnchor=mondayOf(parse("2026-06-22"));   // 표시 주
let monthAnchor="2026-06";
const YEAR=2026;
const TODAY=parse("2026-06-24"); // '오늘' 하이라이트(데모)

/* ── 렌더 진입 ─────────────────────────────────────────── */
const $=s=>document.querySelector(s);
function renderLegend(){
  $("#legend").innerHTML=CATS.map(c=>`<span class="lg"><span class="dot" style="background:${c.bg};border:1px solid ${c.dot}"></span>${c.name}</span>`).join("");
}
function tile(k,v){return `<div class="tile"><div class="k">${k}</div><div class="v">${v}</div></div>`;}

function catBar(rows,title){
  const t=catTotals(rows),tot=sum(t)||1;
  const ordered=CATS.map(c=>({c,h:t[c.key]})).filter(x=>x.h>0).sort((a,b)=>b.h-a.h);
  const max=Math.max(...ordered.map(x=>x.h),1);
  const rowsHtml=ordered.map(({c,h})=>{
    const w=Math.round(h/max*100),pct=Math.round(h/tot*100);
    return `<div class="bar-row"><div class="name">${c.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${c.bg};color:${c.fg}">${h}h</div></div>
      <div class="pct">${pct}%</div></div>`;}).join("");
  return `<div class="sec-title">카테고리별 시간 비중 <small>${title} · 채운 블록 × 2h</small></div>
    <div class="card"><div class="bars">${rowsHtml||'<div style="padding:20px;color:#a29e96">데이터 없음</div>'}</div></div>`;
}

/* 스택 막대: cols=[{cap,tot,segs:[{cat,h}]}] */
function stacked(cols,title,sub){
  const max=Math.max(...cols.map(c=>c.tot),1);
  const body=cols.map(col=>{
    const segs=CATS.map(c=>{const s=col.segs.find(x=>x.cat===c.key);return s&&s.h>0?
      `<div class="seg" title="${c.name} ${s.h}h" style="height:${s.h/max*180}px;background:${c.bg}"></div>`:"";}).join("");
    return `<div class="stackcol"><div class="col">${segs}</div><div class="cap">${col.cap}</div></div>`;
  }).join("");
  // tot 라벨을 위해 다시 상단표시
  const tops=cols.map(col=>`<div style="flex:1;text-align:center;font-size:12px;color:#a29e96">${col.tot}h</div>`).join("");
  return `<div class="sec-title">${title} <small>${sub||""}</small></div>
    <div class="card"><div style="display:flex;gap:22px;padding:14px 16px 0">${tops}</div>
    <div class="stackwrap">${body}</div></div>`;
}

function insight(html){$("#insight").innerHTML=html;}

/* ── 뷰: 주간 ──────────────────────────────────────────── */
function renderWeek(){
  const start=new Date(weekAnchor), end=new Date(start);end.setDate(end.getDate()+6);
  const wk=isoWeek(start);
  $("#navLabel").textContent=`${fmtMD(start)} – ${fmtMD(end)} · W${wk}`;
  $("#navHint").textContent="셀 위에 마우스 = 업무 내용 · 파란 테두리 = 오늘";
  const inWeek=ROWS.filter(r=>r.wkStart.getTime()===start.getTime());
  // tiles
  const t=catTotals(inWeek),tot=sum(t);
  const top=CATS.map(c=>({c,h:t[c.key]})).sort((a,b)=>b.h-a.h)[0];
  $("#tiles").innerHTML=[
    tile("기록된 시간",`${tot}h`),
    tile("세일즈/BD",`${t.세일즈}h`),
    tile("미팅",`${t.미팅}h`),
    tile("최다 카테고리",`<span style="font-size:20px">${top&&top.h?top.c.name:"—"}</span>`),
  ].join("");
  // grid
  let head="<tr><th></th>";
  for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);
    const isT=d.getTime()===TODAY.getTime();
    head+=`<th class="${isT?'today':''}">${DOW[i]}<span class="d">${fmtMD(d)}</span></th>`;}
  head+="</tr>";
  let rowsH="";
  TIMES.forEach(tm=>{
    rowsH+=`<tr><td class="time">${tm}</td>`;
    for(let i=0;i<7;i++){const d=new Date(start);d.setDate(d.getDate()+i);
      const iso=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const cell=inWeek.find(r=>r.date===iso&&r.s===tm);
      const isT=d.getTime()===TODAY.getTime();
      if(cell){const c=CAT[cell.cat];
        rowsH+=`<td><div class="cell filled ${isT?'today':''}" style="background:${c.bg};color:${c.fg}" data-memo="${cell.memo}${cell.actual?'':' (계획)'}">
          ${c.name.split("/")[0]}<span class="adot" style="background:${c.fg};${cell.actual?'':'opacity:.25'}"></span></div></td>`;
      } else rowsH+=`<td><div class="cell ${isT?'today':''}"></div></td>`;
    }
    rowsH+="</tr>";
  });
  $("#viewRoot").innerHTML=`<div class="card"><div class="gridscroll"><table class="grid">${head}${rowsH}</table></div></div>
    <div class="foot">점 = 실측(흐린 점 = 계획) · <b>파란 테두리 = 오늘</b> · 모바일은 좌우 스크롤 · 셀 탭/마우스 = 업무 내용</div>
    ${catBar(inWeek,"이번 주")}`;
  const pctSales=tot?Math.round(t.세일즈/tot*100):0;
  const night=inWeek.filter(r=>["20–22","22–24"].includes(r.s)).length;
  insight(`<h3>🔎 이번 주 흐름</h3><ul>
    <li>세일즈/제안·미팅이 이번 주 축 — 넷마블·올리브트리·코웨이가 동시에 진행 중. <b>세일즈/BD ${pctSales}%</b>.</li>
    <li class="warn">⚠ 야간(20시 이후) 블록 ${night}개 · 휴식 블록 0 — 종료 시각이 늦어지는 중.</li>
    <li>목 6/25는 계획(흐린 점): 넷마블 업세일즈 마무리 → 박연옥 메일 → KPI → 리뷰.</li></ul>`);
}

/* ── 뷰: 월간 ──────────────────────────────────────────── */
function monthRows(m){return ROWS.filter(r=>r.month===m);}
function renderMonth(){
  const rows=monthRows(monthAnchor);
  const [y,mm]=monthAnchor.split("-");
  $("#navLabel").textContent=`${y}년 ${Number(mm)}월`;
  $("#navHint").textContent="매월 1일 전월 기준 자동 생성되는 뷰";
  const t=catTotals(rows),tot=sum(t);
  const top=CATS.map(c=>({c,h:t[c.key]})).sort((a,b)=>b.h-a.h)[0];
  const nightP=tot?Math.round(rows.filter(r=>["20–22","22–24"].includes(r.s)).length*HRS/tot*100):0;
  $("#tiles").innerHTML=[
    tile("총 기록",`${tot}h`),
    tile("최다 카테고리",`<span style="font-size:20px">${top&&top.h?top.c.name:"—"}</span>`),
    tile("야간 블록 비중",`${nightP}%`),
    tile("주요 프로젝트",`<span style="font-size:18px">${topProj(rows)}</span>`),
  ].join("");
  // 주차별 스택
  const weeks=[...new Set(rows.map(r=>r.week))].sort((a,b)=>a-b);
  const cols=weeks.map(w=>{const wr=rows.filter(r=>r.week===w);const ct=catTotals(wr);
    return{cap:"W"+w,tot:sum(ct),segs:CATS.map(c=>({cat:c.key,h:ct[c.key]}))};});
  $("#viewRoot").innerHTML=catBar(rows,`${Number(mm)}월`)+
    stacked(cols,"주차별 추이","주 × 카테고리(스택)")+
    projList(rows);
  insight(`<h3>📊 ${Number(mm)}월 리뷰</h3><ul>
    <li>이 달의 무게중심: <b>${top?top.c.name:"—"}</b> (${top?top.h:0}h). 총 ${tot}h 기록.</li>
    <li>주차별로 보면 ${weeks.map(w=>"W"+w).join("·")} 순으로 진행 — 후반부로 갈수록 세일즈/견적 비중 상승.</li>
    <li class="warn">⚠ 야간 블록 비중 ${nightP}% — 다음 달 목표: 야간 20% 이하 / 주 1회 AI작업 블록 확보.</li></ul>`);
}
function topProj(rows){const m={};rows.forEach(r=>{if(r.proj&&r.proj!=="내부"&&r.proj!=="팀")m[r.proj]=(m[r.proj]||0)+HRS;});
  const e=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];return e?`${e[0]} ${e[1]}h`:"—";}
function projList(rows){const m={};rows.forEach(r=>{const k=r.proj||"기타";m[k]=(m[k]||0)+HRS;});
  const e=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6);const max=e[0]?e[0][1]:1;
  const body=e.map(([n,h])=>`<div class="bar-row"><div class="name">${n}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(h/max*100)}%;background:#e6e3db;color:#4a4741">${h}h</div></div>
    <div class="pct"></div></div>`).join("");
  return `<div class="sec-title">주요 업무 Top <small>프로젝트/클라이언트별</small></div><div class="card"><div class="bars">${body}</div></div>`;
}

/* ── 뷰: 반기 ──────────────────────────────────────────── */
function renderHalf(){
  $("#navLabel").textContent=`${YEAR} 상반기 (1–6월)`;
  $("#navHint").textContent="월별 추이 · 상/하반기 요약";
  const rows=ROWS.filter(r=>r.year===YEAR&&r.half==="상반기");
  const t=catTotals(rows),tot=sum(t);
  const top=CATS.map(c=>({c,h:t[c.key]})).sort((a,b)=>b.h-a.h)[0];
  const months=[...new Set(rows.map(r=>r.monthN))].sort((a,b)=>a-b);
  $("#tiles").innerHTML=[
    tile("상반기 총 기록",`${tot}h`),
    tile("최다 카테고리",`<span style="font-size:20px">${top?top.c.name:"—"}</span>`),
    tile("기록된 월",`${months.length}<small> / 6개월</small>`),
    tile("주요 프로젝트",`<span style="font-size:18px">${topProj(rows)}</span>`),
  ].join("");
  const cols=months.map(mn=>{const mr=rows.filter(r=>r.monthN===mn);const ct=catTotals(mr);
    return{cap:mn+"월",tot:sum(ct),segs:CATS.map(c=>({cat:c.key,h:ct[c.key]}))};});
  $("#viewRoot").innerHTML=stacked(cols,"월별 추이","월 × 카테고리(스택)")+catBar(rows,"상반기 누적");
  insight(`<h3>🗓️ ${YEAR} 상반기</h3><ul>
    <li>상반기 무게중심: <b>${top?top.c.name:"—"}</b>. 월이 쌓일수록 카테고리 믹스 변화가 보입니다.</li>
    <li>이번 주(6/22~)부터 누적 시작 — 로그가 쌓이면 월별 추이가 자동으로 채워집니다.</li></ul>`);
}

/* ── 뷰: 연간 ──────────────────────────────────────────── */
function renderYear(){
  $("#navLabel").textContent=`${YEAR}년`;
  $("#navHint").textContent="12개월 추이 · 상/하반기 비교";
  const rows=ROWS.filter(r=>r.year===YEAR);
  const t=catTotals(rows),tot=sum(t);
  const h1=ROWS.filter(r=>r.year===YEAR&&r.half==="상반기"),h2=ROWS.filter(r=>r.year===YEAR&&r.half==="하반기");
  $("#tiles").innerHTML=[
    tile("연간 총 기록",`${tot}h`),
    tile("상반기",`${sum(catTotals(h1))}h`),
    tile("하반기",`${sum(catTotals(h2))}h`),
    tile("주요 프로젝트",`<span style="font-size:18px">${topProj(rows)}</span>`),
  ].join("");
  const cols=[];for(let mn=1;mn<=12;mn++){const mr=rows.filter(r=>r.monthN===mn);const ct=catTotals(mr);
    cols.push({cap:mn+"월",tot:sum(ct),segs:CATS.map(c=>({cat:c.key,h:ct[c.key]}))});}
  $("#viewRoot").innerHTML=stacked(cols,"월별 추이 (1–12월)","월 × 카테고리(스택)")+catBar(rows,"연간 누적");
  insight(`<h3>📈 ${YEAR}년</h3><ul>
    <li>상반기 ${sum(catTotals(h1))}h vs 하반기 ${sum(catTotals(h2))}h — 월별 스택으로 루틴 변화 추적.</li>
    <li>연간 뷰는 매월 로그가 자동 롤업됩니다.</li></ul>`);
}

/* ── 라우팅 ────────────────────────────────────────────── */
function render(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.view===view));
  $("#nav").style.display=(view==="week"||view==="month")?"flex":"flex";
  if(view==="week")renderWeek();
  else if(view==="month")renderMonth();
  else if(view==="half")renderHalf();
  else renderYear();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{view=t.dataset.view;render();});
$("#prev").onclick=()=>{shift(-1);};
$("#next").onclick=()=>{shift(1);};
function shift(dir){
  if(view==="week"){weekAnchor.setDate(weekAnchor.getDate()+7*dir);render();}
  else if(view==="month"){let[y,m]=monthAnchor.split("-").map(Number);m+=dir;if(m<1){m=12;y--;}if(m>12){m=1;y++;}
    monthAnchor=y+"-"+String(m).padStart(2,"0");render();}
}
renderLegend();render();
</script>
</body>
</html>
