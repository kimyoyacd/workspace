@font-face { font-family:'BlackHan'; font-weight:400; src:url(data:font/woff2;base64,__BLACKHAN_FONT_B64__) format('woff2'); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1920px; height:1080px; overflow:hidden; }
body { position:relative; width:1920px; height:1080px; background:#F3ECD8; font-family:'Fredoka', sans-serif; }
.halftone { position:absolute; inset:0; background-image: radial-gradient(#1a2340 1.6px, transparent 1.7px); background-size: 10px 10px; opacity:0.06; z-index:5; }
.grid-wrap { position:absolute; right:-60px; bottom:-40px; width:1550px; border:10px solid #1a1a1a; box-shadow: 0 0 0 6px #F3ECD8, 18px 18px 0 0 rgba(26,26,26,0.9); transform: rotate(-1.4deg); overflow:hidden; z-index:1; }
.grid-wrap img { display:block; width:100%; filter: saturate(0.92) brightness(0.97); }
.grid-shade { position:absolute; inset:0; background: linear-gradient(100deg, rgba(243,236,216,0.94) 0%, rgba(243,236,216,0.35) 30%, rgba(243,236,216,0.05) 55%); }
.ribbon { position:absolute; top:46px; left:60px; z-index:20; display:flex; align-items:center; gap:16px; transform: rotate(-2deg); }
.ribbon .logo { width:76px; height:57px; border-radius:10px; overflow:hidden; border:4px solid #1a1a1a; box-shadow:5px 5px 0 rgba(26,26,26,0.85); }
.ribbon .logo img { width:100%; display:block; }
.ribbon .word { background:#1a1a1a; color:#F3ECD8; font-family:'Fredoka'; font-weight:700; font-size:26px; letter-spacing:2px; padding:10px 20px; border-radius:8px; }
.badge { position:absolute; top:44px; right:64px; z-index:20; width:150px; height:150px; border-radius:50%; background:#D9432E; border:6px solid #1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#F3ECD8; font-family:'Fredoka'; font-weight:700; transform:rotate(8deg); box-shadow: 6px 6px 0 rgba(26,26,26,0.85); }
.badge .ep { font-size:30px; line-height:1; }
.badge .sh { font-size:15px; letter-spacing:3px; margin-top:4px; }
.title-block { position:absolute; left:64px; top:190px; z-index:20; width:760px; }
.eyebrow-tag { display:inline-block; background:#2A4BD7; color:#F3ECD8; font-family:'BlackHan'; font-size:26px; padding:8px 22px; border-radius:6px; border:4px solid #1a1a1a; transform:rotate(-2deg); box-shadow:5px 5px 0 rgba(26,26,26,0.85); margin-bottom:26px; }
