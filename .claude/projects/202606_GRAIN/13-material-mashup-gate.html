<style>

<body>
  <h1>GRAIN — "우연의 일치" 소재 매시업 실험</h1>
  <p class="note">Instrument Grade(계측기 미학)와 완전히 다른 방향 — 예상 못한 소재 조합(젤리, 리퀴드 크롬, 포일 캔디, 크롬 사과, 서리얼 매시업)으로 모래시계를 확장한 실험. 이 톤이 GRAIN에 맞는 방향인지, 어떤 조합이 흥미로운지 확인해주세요.</p>
  <div class="grid">
    <figure>
      <img src="https://d8j0ntlcm91z4.cloudfront.net/user_2xRL15Rqznvjzwppcb2PjNb6rfo/hf_20260701_140322_4c741ee4-45a5-4222-99af-42815c4c71a4.png" alt="젤리 모래시계">
      <figcaption><b>A</b>젤리 챔버 — 반투명 젤리 질감, 번트케이크 리브 표면</figcaption>
    </figure>
    <figure>
      <img src="https://d8j0ntlcm91z4.cloudfront.net/user_2xRL15Rqznvjzwppcb2PjNb6rfo/hf_20260701_140323_3f636db2-87fc-4ea8-b995-c391d2ca35fd.png" alt="리퀴드 크롬 모래">
      <figcaption><b>B</b>리퀴드 크롬 모래 — 모래가 수은처럼 흘러내리는 반사 액체</figcaption>
    </figure>
    <figure>
      <img src="https://d8j0ntlcm91z4.cloudfront.net/user_2xRL15Rqznvjzwppcb2PjNb6rfo/hf_20260701_140324_7bb4bc9d-ab94-46ae-b018-05174d3a56be.png" alt="포일 캔디 포장">
      <figcaption><b>C</b>포일 캔디 포장 — 구겨진 금속 포일 속 캔디처럼 드러나는 챔버</figcaption>
    </figure>
    <figure>
      <img src="https://d8j0ntlcm91z4.cloudfront.net/user_2xRL15Rqznvjzwppcb2PjNb6rfo/hf_20260701_140326_e48dd5bf-5c24-45f0-8f60-5706275c2442.png" alt="한입 베어문 크롬">
      <figcaption><b>D</b>한입 베어문 크롬 — 사과처럼 베어물어 골드 모래가 드러나는 리빌</figcaption>
    </figure>
    <figure>
      <img src="https://d8j0ntlcm91z4.cloudfront.net/user_2xRL15Rqznvjzwppcb2PjNb6rfo/hf_20260701_140327_0169ab56-c416-40b8-8b0c-093d4463df9b.png" alt="마티니 매시업">
      <figcaption><b>E</b>마티니 매시업 — 모래시계+마티니잔 실루엣 융합, 크롬 체리</figcaption>
    </figure>
