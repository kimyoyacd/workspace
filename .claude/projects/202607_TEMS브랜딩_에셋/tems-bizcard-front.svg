<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 50" width="360" height="200">
  <!-- 명함 앞면 — 실치수 90×50mm (1u=1mm, 재단선 기준 / 도련 +3mm 별도).
       사양: 비코팅 크림 450gsm 듀플렉스 · 네이비 1도 · 심볼 레터프레스 · 앰버 노드 = 샴페인 골드 포일 별색
       인적사항은 더미 — 실데이터 교체 후 아웃라인 처리 -->
  <rect width="90" height="50" fill="#F7F3EA"/>
  <g transform="translate(8,7) scale(0.10)">
    <rect x="0" y="0" width="84" height="18" fill="#0E2A47"/>
    <rect x="21" y="66" width="14" height="18" fill="#0E2A47"/>
    <rect x="35" y="42" width="14" height="42" fill="#0E2A47"/>
    <rect x="49" y="18" width="14" height="66" fill="#0E2A47"/>
    <rect x="35" y="18" width="14" height="14" fill="#E8A13D"/>
  </g>
  <text x="21" y="12.2" font-family="Avenir Next,Helvetica Neue,Arial,sans-serif" font-weight="700" font-size="6" letter-spacing="1.4" fill="#0E2A47">TEMS</text>
  <text x="21" y="16.6" font-family="Avenir Next,Helvetica Neue,Arial,sans-serif" font-weight="300" font-size="2.9" letter-spacing="0.8" fill="#0E2A47" opacity=".82">Intelligence</text>
  <text x="8" y="38" font-family="Pretendard,Apple SD Gothic Neo,sans-serif" font-weight="700" font-size="3.6" fill="#0E2A47">김템스 <tspan font-weight="400" font-size="2.6" opacity=".75">대표 · CEO</tspan></text>
  <text x="8" y="42.6" font-family="Pretendard,Apple SD Gothic Neo,sans-serif" font-size="2.4" fill="#0E2A47" opacity=".72">kim@tems-intelligence.ai · 010-0000-0000</text>
  <text x="8" y="45.8" font-family="Pretendard,Apple SD Gothic Neo,sans-serif" font-size="2.4" fill="#0E2A47" opacity=".72">tems-intelligence.ai</text>
</svg>
