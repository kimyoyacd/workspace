<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170">
  <!-- 세로 락업 (심볼 상단 + 워드마크 하단) — 명함·표지·포스터 다크/블루 배경 기본형.
       ※ 워드마크는 커스텀 서체 전 시스템 드래프트(Helvetica Neue) — 리서치 결론상 전용 서체 승격 권장 -->
  <defs>
    <mask id="lvMask">
      <circle cx="150" cy="35" r="26" fill="#fff"/>
      <g stroke="#000" stroke-width="6.2" fill="none" stroke-linecap="round">
        <path d="M 128,29 Q 150,20 172,29"/>
        <path d="M 151.5,24.5 Q 156,45 145,64"/>
      </g>
    </mask>
  </defs>
  <circle cx="150" cy="35" r="26" fill="#F2F5FF" mask="url(#lvMask)"/>
  <text x="150" y="118" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
    font-weight="700" font-size="34" letter-spacing="-0.5" fill="#F2F5FF">TEMS</text>
  <text x="150" y="142" text-anchor="middle" font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
    font-weight="400" font-size="11" letter-spacing="3.2" fill="#F2F5FF" opacity=".66">INTELLIGENCE</text>
</svg>
