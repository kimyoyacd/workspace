  <circle cx="45" cy="45" r="33" fill="#FFFFFF" mask="url(#lhMask)"/>
  <text x="100" y="53" font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
    font-weight="700" font-size="36" letter-spacing="-0.5" fill="#FFFFFF">TEMS</text>
  <text x="101" y="72" font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
