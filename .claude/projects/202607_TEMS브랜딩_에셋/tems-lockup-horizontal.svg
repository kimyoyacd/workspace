<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <!-- 가로 락업 (심볼 좌 + 워드마크 우) — 웹 헤더·이메일 시그니처·문서 상단 다크/블루 배경용.
       ※ 워드마크는 커스텀 서체 전 시스템 드래프트 -->
  <defs>
    <mask id="lhMask">
      <circle cx="45" cy="45" r="33" fill="#fff"/>
      <g stroke="#000" stroke-width="8" fill="none" stroke-linecap="round">
        <path d="M 6,37.5 Q 45,25.5 84,37.5"/>
        <path d="M 47.3,31.5 Q 52.5,58.5 39,84"/>
