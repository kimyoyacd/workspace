<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- TEMS Intelligence — Orbit T 심볼 (v0.3, 정색: Electric Blue #2B4EFF)
       구체 위 두 궤도 커브가 네거티브 스페이스로 T를 새긴다.
       수평 궤도 = 판단의 지평(5가지 판단축), 하강 커브 = 케이스가 자산으로 쌓이는 흐름.
       클리어스페이스: 반경(44u)의 25% 사방 확보. 최소 사용 크기: 인쇄 6mm / 화면 20px (이하는 파비콘 전용 락업 사용) -->
  <defs>
    <mask id="temsOrbitMask">
      <circle cx="60" cy="60" r="44" fill="#fff"/>
      <g stroke="#000" stroke-width="10.5" fill="none" stroke-linecap="round">
        <path d="M 8,50 Q 60,34 112,50"/>
        <path d="M 63,42 Q 70,78 52,112"/>
      </g>
    </mask>
  </defs>
  <circle cx="60" cy="60" r="44" fill="#2B4EFF" mask="url(#temsOrbitMask)"/>
</svg>
