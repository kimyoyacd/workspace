<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>풍사전 — 디자인 키워드 번역기</title>
</head>
<body>
<style>
  /* Cosmos.so 레퍼런스 — 다크 단일 테마에 의도적으로 커밋 */
  :root, :root[data-theme="light"], :root[data-theme="dark"] {
    --bg: #0C0C0D;
    --surface: #151517;
    --surface-2: #1C1C1F;
    --ink: #F2F1ED;
    --ink-2: rgba(242, 241, 237, 0.60);
    --ink-3: rgba(242, 241, 237, 0.38);
    --line: rgba(242, 241, 237, 0.10);
    --line-soft: rgba(242, 241, 237, 0.06);
    --m-photo: #6FCDB9;
    --m-type: #B9A3EF;
    --m-video: #E5B36F;
    --serif: "Noto Serif KR", "Nanum Myeongjo", Georgia, "Times New Roman", serif;
    --sans: "Pretendard Variable", Pretendard, "Noto Sans KR", -apple-system, "Malgun Gothic", sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px 96px; }

  /* ── 헤더 ─────────────────────────── */
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 30px 0; flex-wrap: wrap; gap: 8px;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 { font-family: var(--serif); font-size: 24px; font-weight: 600; letter-spacing: 0.01em; margin: 0; }
  .brand .sub { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.12em; }
  .ver { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.1em; }

  /* ── 검색 (센터드 히어로) ────────────── */
  .search-band { padding: 72px 0 12px; max-width: 720px; margin: 0 auto; text-align: center; }
  .search-tagline {
    font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--ink-2);
    margin-bottom: 26px; letter-spacing: 0.01em;
  }
  .search-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--line); }
  .search-row:focus-within { border-bottom-color: rgba(242, 241, 237, 0.45); }
  #kw-input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-family: var(--serif); font-size: 32px; font-weight: 500;
    color: var(--ink); padding: 8px 4px 16px; min-width: 0; text-align: center;
  }
  #kw-input::placeholder { color: var(--ink-3); font-style: italic; font-size: 24px; }
  #kw-btn {
    border: 0; background: transparent; cursor: pointer;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
    color: var(--ink-2); padding: 0 6px 12px;
  }
  #kw-btn:hover, #kw-btn:focus-visible { color: var(--ink); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 22px 0 0; justify-content: center; }
  .chip {
    border: 1px solid var(--line); background: transparent; color: var(--ink-2);
    font-family: var(--sans); font-size: 13px; padding: 6px 15px; border-radius: 100px;
    cursor: pointer; transition: all 0.15s ease;
  }
  .chip:hover { border-color: rgba(242, 241, 237, 0.4); color: var(--ink); }
  .chip.active { background: var(--ink); border-color: var(--ink); color: var(--bg); font-weight: 600; }
  .chip .t { font-family: var(--mono); font-size: 10px; opacity: 0.6; margin-left: 5px; }

  .notfound {
    margin: 28px auto 0; max-width: 560px; padding: 18px 22px;
    border: 1px dashed var(--line); border-radius: 12px;
    color: var(--ink-2); font-size: 13.5px; text-align: center;
  }
  .notfound strong { color: var(--ink); }

  /* ── 결과 헤더 (센터드) ─────────────── */
  .result-head { text-align: center; padding: 64px 0 6px; }
  .result-head .kw {
    font-family: var(--serif); font-size: 58px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.15; text-wrap: balance; display: block;
  }
  .result-head .meta { margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 12px; }
  .result-head .en { font-family: var(--mono); font-size: 13px; color: var(--ink-2); letter-spacing: 0.06em; }
  .pos-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    border: 1px solid var(--line); color: var(--ink-2);
    padding: 2.5px 9px; border-radius: 100px;
  }
  .pos-badge.onomat { border-color: rgba(242, 241, 237, 0.45); color: var(--ink); }

  /* 확장 키워드 — 인라인 글로서리 */
  .exp-flow {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 26px;
    max-width: 860px; margin: 26px auto 0; padding-bottom: 8px;
  }
  .exp-item { text-align: center; }
  .exp-item .ko { font-family: var(--serif); font-size: 17px; color: var(--ink); }
  .exp-item .tbadge {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; color: var(--ink-3);
    border: 1px solid var(--line); padding: 1px 5px; border-radius: 100px; margin-left: 6px; vertical-align: 2px;
  }
  .exp-item .en { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 1px; }

  /* ── 탭 (센터드 필) ─────────────────── */
  .tabs {
    display: flex; justify-content: center; gap: 4px; flex-wrap: wrap;
    margin: 36px 0 30px;
  }
  .tab {
    border: 0; background: transparent; cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink-2);
    padding: 7px 16px; border-radius: 100px;
    display: flex; align-items: center; gap: 7px; transition: all 0.15s ease;
  }
  .tab:hover { color: var(--ink); background: var(--surface); }
  .tab.active { background: var(--surface-2); color: var(--ink); font-weight: 600; }
  .tab .sw { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .tab .cnt { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }

  /* ── 마소니 카드 ───────────────────── */
  .cards { columns: 3 340px; column-gap: 18px; }
  .card {
    background: var(--surface); border: 1px solid var(--line-soft); border-radius: 16px;
    overflow: hidden; margin-bottom: 18px;
    break-inside: avoid; display: flex; flex-direction: column;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .card:hover { border-color: var(--line); transform: translateY(-2px); }

  /* 무드 스와치 — 생성 이미지가 붙을 자리 */
  .mood {
    aspect-ratio: 8 / 5; position: relative; display: flex; align-items: flex-end;
  }
  .mood .mood-label {
    position: absolute; top: 12px; left: 14px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
    color: rgba(255, 255, 255, 0.85); mix-blend-mode: difference;
  }
  .mood .mood-kw {
    font-family: var(--serif); font-style: italic; font-size: 22px;
    color: rgba(255, 255, 255, 0.92); mix-blend-mode: difference;
    padding: 0 14px 10px;
  }

  .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 13px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .mode-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
  }
  .mode-tag .sw { width: 8px; height: 8px; border-radius: 50%; }
  .card-head .btns { display: flex; gap: 6px; }
  .cbtn {
    border: 1px solid var(--line); background: transparent; cursor: pointer;
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-2);
    padding: 4px 11px; border-radius: 100px; transition: all 0.15s ease;
  }
  .cbtn:hover { border-color: rgba(242, 241, 237, 0.4); color: var(--ink); }
  .cbtn.done, .cbtn.saved { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  .prompt {
    font-family: var(--mono); font-size: 12px; line-height: 1.8;
    color: var(--ink-2); background: var(--bg);
    padding: 13px 15px; border-radius: 10px; border: 1px solid var(--line-soft);
    overflow-x: auto;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-family: var(--mono); font-size: 10.5px; padding: 3px 9px; border-radius: 100px;
    border: 1px solid var(--line); color: var(--ink-2);
  }
  .tag.origin { border-color: rgba(242, 241, 237, 0.35); color: var(--ink); }

  /* AI 툴 궁합 */
  .tools { border-top: 1px dashed var(--line); padding-top: 11px; display: flex; flex-direction: column; gap: 7px; }
  .tools-lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em; color: var(--ink-3); }
  .tool-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .tool-name { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; }
  .fit-badge {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    padding: 1.5px 7px; border-radius: 100px;
    border: 1px solid var(--line); color: var(--ink-2);
  }
  .fit-badge.best { background: var(--ink); border-color: var(--ink); color: var(--bg); }
  .tool-why { font-size: 11.5px; color: var(--ink-3); }

  .spec { margin: 0; border-top: 1px dashed var(--line); padding-top: 11px; }
  .spec-row { display: grid; grid-template-columns: 86px 1fr; gap: 10px; padding: 3px 0; font-size: 12px; }
  .spec-row dt { color: var(--ink-3); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; padding-top: 1px; }
  .spec-row dd { margin: 0; color: var(--ink-2); }

  .saved-group-title {
    column-span: all; font-family: var(--serif); font-size: 19px; font-weight: 600;
    padding: 14px 0 14px; display: flex; align-items: baseline; gap: 10px;
  }
  .saved-group-title .en { font-family: var(--mono); font-size: 11px; color: var(--ink-3); font-weight: 400; }
  .empty-saved { column-span: all; padding: 56px 0; text-align: center; color: var(--ink-3); font-size: 14px; }

  footer {
    margin-top: 88px; padding-top: 22px; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 12px; color: var(--ink-3); line-height: 1.7;
  }
  footer .mono { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise 0.3s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  }
  @media (prefers-reduced-motion: reduce) {
    .card, .card:hover { transform: none; transition: none; }
  }
  :focus-visible { outline: 2px solid rgba(242, 241, 237, 0.6); outline-offset: 2px; }
</style>

<div class="wrap">
  <header>
    <div class="brand">
      <h1>풍사전</h1>
      <span class="sub">PUNG·DICT — 디자인 키워드 번역기</span>
    </div>
    <span class="ver">PROTOTYPE v0.2 · 10 KEYWORDS</span>
  </header>

  <section class="search-band">
    <p class="search-tagline">느낌은 있는데, 말이 안 나올 때.</p>
    <div class="search-row">
      <input id="kw-input" list="kw-list" placeholder="우아한, 반짝반짝, 쓸쓸한…" autocomplete="off" />
      <datalist id="kw-list"></datalist>
      <button id="kw-btn">번역 →</button>
    </div>
    <div class="chip-row" id="chip-row"></div>
    <div class="notfound" id="notfound" hidden></div>
  </section>

  <section id="result" hidden>
    <div class="result-head">
      <span class="kw" id="r-kw"></span>
      <div class="meta">
        <span class="en" id="r-en"></span>
        <span class="pos-badge" id="r-pos"></span>
      </div>
      <div class="exp-flow" id="exp-list"></div>
    </div>
    <nav class="tabs" id="tabs"></nav>
    <div class="cards" id="cards"></div>
  </section>

  <footer>
    <span>프로토타입 사양 — 키워드 10종 × 3모달(사진·타이포·영상) 수동 큐레이션. AI 툴 궁합은 실무 체감 기준 초깃값. 실서비스에서는 LLM이 임의 키워드를 실시간 번역·확장.</span>
    <span class="mono">MX STUDIO INTERNAL TOOL</span>
  </footer>
</div>

<script>
const MODES = {

  "아련한:type":    [["Midjourney", "최적", "레터프레스 질감 묘사"], ["Ideogram", "적합", "빈티지 레이아웃 글자"]],

        spec: [["룩", "슈퍼8 필름"], ["프레임", "18fps 케이던스"], ["효과", "플리커 + 비네트"], ["전환", "슬로우 페이드"]],
      },
    },
  },
  {
    kw: "쨍한", en: "punchy, vivid", pos: "형용사",
    exp: [
      { ko: "선명한", en: "razor-sharp" },
      { ko: "짱짱한", en: "punchy and solid" },
      { ko: "팽팽한", en: "taut" },
      { ko: "새파란", en: "electric blue" },
      { ko: "번쩍번쩍", en: "flashing brilliantly", t: "의태어" },
    ],
    modes: {
      photo: {
        prompt: "Hard noon sunlight, deep crisp shadows, fully saturated primary colors, polarizer-deep blue sky, sharp edge-to-edge focus at f/8",
        tags: ["조명-정오직사광", "채도-최대", "하늘-편광딥블루", "초점-팬포커스"],
        spec: [["조명", "정오 직사광"], ["필터", "편광 (PL)"], ["조리개", "f/8 팬포커스"], ["톤", "고채도 원색"]],
      },
      type: {
        prompt: "Solid black geometric sans, flat primary-color blocks, thick sticker outline, no gradients, poster-scale composition",
        tags: ["계열-지오메트릭블랙", "컬러-원색플랫", "외곽-스티커아웃라인", "스케일-포스터"],
        spec: [["분류", "지오메트릭 산스 블랙"], ["컬러", "플랫 원색"], ["효과", "스티커 아웃라인"], ["참고 서체", "Futura Bold, G마켓 산스 Bold"]],
      },
      video: {
        prompt: "Hard cuts exactly on the beat, crash zooms, fully saturated grade, graphic color blocks as transitions, snappy 6-frame moves",
        tags: ["컷-비트정박", "무브-크래시줌", "전환-컬러블록", "속도-스냅6f"],
        spec: [["편집", "비트 정박 컷"], ["무브", "크래시 줌"], ["전환", "그래픽 컬러 블록"], ["모션", "6프레임 스냅"]],
      },
    },
  },
];

/* ── 상태 ─────────────────────────── */
let curIdx = 0;
let curTab = "all"; // all | photo | type | video | saved
let saved = [];
try { saved = JSON.parse(localStorage.getItem("pungdict-saved") || "[]"); } catch (e) { saved = []; }

function persistSaved() {
  try { localStorage.setItem("pungdict-saved", JSON.stringify(saved)); } catch (e) {}
}

const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

/* ── 렌더 ─────────────────────────── */
function renderChips() {
  const row = $("chip-row");
  row.querySelectorAll(".chip").forEach((c) => c.remove());
  DICT.forEach((d, i) => {
    const b = document.createElement("button");
    b.className = "chip" + (i === curIdx && curTab !== "saved" ? " active" : "");
    b.innerHTML = esc(d.kw) + (d.pos !== "형용사" ? '<span class="t">' + esc(d.pos) + "</span>" : "");
    b.onclick = () => { loadKeyword(i); };
    row.appendChild(b);
  });
  const dl = $("kw-list");
  dl.innerHTML = DICT.map((d) => '<option value="' + esc(d.kw) + '">').join("");
}

function renderTabs() {
  const defs = [
    ["all", null, "전체", null],
    ["photo", MODES.photo.color, "사진", null],
    ["type", MODES.type.color, "타이포", null],
    ["video", MODES.video.color, "영상", null],
    ["saved", null, "보관함", saved.length],
  ];
  $("tabs").innerHTML = defs.map(([key, color, label, cnt]) =>
    '<button class="tab' + (curTab === key ? " active" : "") + '" data-tab="' + key + '">' +
    (color ? '<span class="sw" style="background:' + color + '"></span>' : "") +
    esc(label) +
    (cnt !== null ? ' <span class="cnt">' + cnt + "</span>" : "") +
    "</button>"
  ).join("");
  $("tabs").querySelectorAll(".tab").forEach((t) => {
    t.onclick = () => { curTab = t.dataset.tab; render(); };
  });
}

function toolsHTML(d, modeKey) {
  const list = TOOLS[d.kw + ":" + modeKey];
  if (!list) return "";
  return (
    '<div class="tools"><span class="tools-lbl">AI TOOL FIT — 이 무드가 잘 나오는 툴</span>' +
    list.map(([name, fit, why]) =>
      '<div class="tool-row"><span class="tool-name">' + esc(name) + "</span>" +
      '<span class="fit-badge' + (fit === "최적" ? " best" : "") + '">' + esc(fit) + "</span>" +
      '<span class="tool-why">' + esc(why) + "</span></div>"
    ).join("") +
    "</div>"
  );
}

function cardHTML(d, modeKey, idxInDict) {
  const m = MODES[modeKey];
  const md = d.modes[modeKey];
  const id = idxInDict + ":" + modeKey;
  const isSaved = saved.includes(id);
  return (
    '<article class="card">' +
      '<div class="mood" style="background:' + (GRADS[d.kw] || "var(--surface-2)") + '">' +
        '<span class="mood-label">MOOD — 생성 이미지 자리</span>' +
        '<span class="mood-kw">' + esc(d.kw) + "</span>" +
      "</div>" +
      '<div class="card-body">' +
        '<div class="card-head">' +
          '<span class="mode-tag" style="color:' + m.color + '"><span class="sw" style="background:' + m.color + '"></span>' + esc(m.label) + "</span>" +
          '<div class="btns">' +
            '<button class="cbtn save-btn' + (isSaved ? " saved" : "") + '" data-id="' + id + '">' + (isSaved ? "저장됨" : "저장") + "</button>" +
            '<button class="cbtn copy-btn" data-prompt="' + esc(md.prompt) + '">복사</button>' +
          "</div>" +
        "</div>" +
        '<div class="prompt">' + esc(md.prompt) + "</div>" +
        '<div class="tags">' +
          '<span class="tag origin">#원본-' + esc(d.kw) + "</span>" +
          md.tags.map((t) => '<span class="tag">#' + esc(t) + "</span>").join("") +
        "</div>" +
        toolsHTML(d, modeKey) +
        '<dl class="spec">' +
          md.spec.map(([k, v]) => '<div class="spec-row"><dt>' + esc(k) + "</dt><dd>" + esc(v) + "</dd></div>").join("") +
        "</dl>" +
      "</div>" +
    "</article>"
  );
}

function bindCardButtons(container) {
  container.querySelectorAll(".copy-btn").forEach((b) => {
    b.onclick = () => {
      const text = b.dataset.prompt;
      const done = () => { b.textContent = "복사됨"; b.classList.add("done"); setTimeout(() => { b.textContent = "복사"; b.classList.remove("done"); }, 1500); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
      } else fallbackCopy(text, done);
    };
  });
  container.querySelectorAll(".save-btn").forEach((b) => {
    b.onclick = () => {
      const id = b.dataset.id;
      const i = saved.indexOf(id);
      if (i >= 0) saved.splice(i, 1); else saved.push(id);
      persistSaved();
      render();
    };
  });
}

function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); done(); } catch (e) {}
  document.body.removeChild(ta);
}

function render() {
  renderChips();
  renderTabs();
  const result = $("result");
  result.hidden = false;
  const cards = $("cards");

  if (curTab === "saved") {
    $("r-kw").textContent = "보관함";
    $("r-en").textContent = "saved prompts";
    $("r-pos").hidden = true;
    $("exp-list").innerHTML = "";
    if (!saved.length) {
      cards.innerHTML = '<div class="empty-saved">저장된 프롬프트가 없습니다. 카드의 [저장] 버튼으로 팀 라이브러리를 만들어 보세요.</div>';
      return;
    }
    let html = "";
    const byKw = {};
    saved.forEach((id) => {
      const [i, mode] = id.split(":");
      (byKw[i] = byKw[i] || []).push(mode);
    });
    Object.keys(byKw).forEach((i) => {
      const d = DICT[+i];
      if (!d) return;
      html += '<div class="saved-group-title">' + esc(d.kw) + '<span class="en">' + esc(d.en) + "</span></div>";
      byKw[i].forEach((mode) => { html += cardHTML(d, mode, +i); });
    });
    cards.innerHTML = html;
    bindCardButtons(cards);
    return;
  }

  const d = DICT[curIdx];
  $("r-kw").textContent = d.kw;
  $("r-en").textContent = d.en;
  const pos = $("r-pos");
  pos.hidden = false;
  pos.textContent = d.pos;
  pos.className = "pos-badge" + (d.pos !== "형용사" ? " onomat" : "");

  $("exp-list").innerHTML = d.exp.map((e) =>
    '<div class="exp-item"><span class="ko">' + esc(e.ko) + "</span>" +
    (e.t ? '<span class="tbadge">' + esc(e.t) + "</span>" : "") +
    '<div class="en">' + esc(e.en) + "</div></div>"
  ).join("");

  const modeKeys = curTab === "all" ? Object.keys(MODES) : [curTab];
  cards.innerHTML = modeKeys.map((mk) => cardHTML(d, mk, curIdx)).join("");
  bindCardButtons(cards);
}

function loadKeyword(i) {
  curIdx = i;
  if (curTab === "saved") curTab = "all";
  $("notfound").hidden = true;
  $("kw-input").value = DICT[i].kw;
  render();
  $("result").scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ── 검색 ─────────────────────────── */
function search() {
  const q = $("kw-input").value.trim();
  if (!q) return;
  const exact = DICT.findIndex((d) => d.kw === q);
  if (exact >= 0) return loadKeyword(exact);
  const partial = DICT.findIndex((d) =>
    d.kw.includes(q) || q.includes(d.kw) ||
    d.exp.some((e) => e.ko.includes(q)) || d.en.includes(q.toLowerCase())
  );
  if (partial >= 0) return loadKeyword(partial);
  const nf = $("notfound");
  nf.hidden = false;
  nf.innerHTML = "<strong>“" + esc(q) + "”</strong>는 프로토타입 사전에 아직 없습니다. 실서비스에서는 LLM이 실시간으로 번역·확장합니다. 지금은 수록 키워드로 흐름을 확인해 보세요.";
}

$("kw-btn").onclick = search;
$("kw-input").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });

render();
</script>
</body>
</html>
