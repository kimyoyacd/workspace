<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결 gyeol — 무드 번역기</title>
</head>
<body>
<style>
  /* cosmos.so 레퍼런스 — 순수 블랙, 보더리스 이미지 퍼스트, 세리프 디스플레이 */
  :root, :root[data-theme="light"], :root[data-theme="dark"] {
    --bg: #0A0A0B;
    --surface: #141416;
    --ink: #F0EFEB;
    --ink-2: rgba(240, 239, 235, 0.62);
    --ink-3: rgba(240, 239, 235, 0.36);
    --line: rgba(240, 239, 235, 0.12);
    --line-soft: rgba(240, 239, 235, 0.07);
    --m-photo: #6FCDB9;
    --m-type: #B9A3EF;
    --m-video: #E5B36F;
    --serif: "Noto Serif KR", "Nanum Myeongjo", Georgia, "Times New Roman", serif;
    --sans: "Pretendard Variable", Pretendard, "Noto Sans KR", -apple-system, "Malgun Gothic", sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 0 36px 110px; }

  /* ── 헤더 — 로워케이스 세리프 워드마크 ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 26px 0; flex-wrap: wrap; gap: 8px;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand h1 {
    font-family: var(--serif); font-size: 23px; font-weight: 500; margin: 0;
    letter-spacing: 0.02em;
  }
  .brand h1 em { font-style: italic; font-weight: 400; color: var(--ink-2); margin-left: 7px; font-size: 19px; }
  .ver { font-family: var(--mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.14em; }

  /* ── 히어로 + 검색 필 ─────────────── */
  .search-band { padding: 88px 0 10px; max-width: 760px; margin: 0 auto; text-align: center; }
  .hero-line {
    font-family: var(--serif); font-size: 42px; font-weight: 500; line-height: 1.3;
    letter-spacing: -0.01em; text-wrap: balance; margin: 0 0 12px;
  }
  .hero-line em { font-style: italic; font-weight: 400; }
  .hero-sub { font-size: 14px; color: var(--ink-3); margin: 0 0 34px; }
  .search-row {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--line); border-radius: 100px;
    padding: 7px 7px 7px 26px; transition: border-color 0.2s ease;
    background: rgba(240, 239, 235, 0.02);
  }
  .search-row:focus-within { border-color: rgba(240, 239, 235, 0.4); }
  #kw-input {
    flex: 1; border: 0; outline: 0; background: transparent;
    font-family: var(--serif); font-size: 19px;
    color: var(--ink); padding: 8px 0; min-width: 0;
  }
  #kw-input::placeholder { color: var(--ink-3); font-style: italic; }
  #kw-btn {
    border: 0; cursor: pointer; border-radius: 100px;
    background: var(--ink); color: var(--bg);
    font-family: var(--sans); font-size: 13.5px; font-weight: 650;
    padding: 10px 22px; transition: opacity 0.15s ease;
  }
  #kw-btn:hover { opacity: 0.85; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 24px 0 0; justify-content: center; }
  .chip {
    border: 1px solid var(--line); background: transparent; color: var(--ink-2);
    font-family: var(--sans); font-size: 13px; padding: 6px 15px; border-radius: 100px;
    cursor: pointer; transition: all 0.15s ease;
  }
  .chip:hover { border-color: rgba(240, 239, 235, 0.4); color: var(--ink); }
  .chip.active { background: var(--ink); border-color: var(--ink); color: var(--bg); font-weight: 600; }
  .chip .t { font-family: var(--mono); font-size: 10px; opacity: 0.6; margin-left: 5px; }

  .notfound {
    margin: 28px auto 0; max-width: 560px; padding: 18px 22px;
    border: 1px dashed var(--line); border-radius: 18px;
    color: var(--ink-2); font-size: 13.5px; text-align: center;
  }
  .notfound strong { color: var(--ink); }

  /* ── 결과 헤더 ────────────────────── */
  .result-head { text-align: center; padding: 72px 0 4px; }
  .result-head .kw {
    font-family: var(--serif); font-size: 56px; font-weight: 500;
    letter-spacing: -0.01em; line-height: 1.15; text-wrap: balance; display: block;
  }
  .result-head .meta { margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 12px; }
  .result-head .en { font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--ink-2); letter-spacing: 0.02em; }
  .pos-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    border: 1px solid var(--line); color: var(--ink-2);
    padding: 2.5px 10px; border-radius: 100px;
  }
  .pos-badge.onomat { border-color: rgba(240, 239, 235, 0.45); color: var(--ink); }

  /* 확장 키워드 — 인라인 글로서리 */
  .exp-flow {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 28px;
    max-width: 880px; margin: 28px auto 0; padding-bottom: 8px;
  }
  .exp-item { text-align: center; }
  .exp-item .ko { font-family: var(--serif); font-size: 17px; color: var(--ink); }
  .exp-item .tbadge {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; color: var(--ink-3);
    border: 1px solid var(--line); padding: 1px 6px; border-radius: 100px; margin-left: 6px; vertical-align: 2px;
  }
  .exp-item .en { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--ink-3); margin-top: 1px; }

  /* ── 탭 ──────────────────────────── */
  .tabs { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; margin: 40px 0 38px; }
  .tab {
    border: 1px solid transparent; background: transparent; cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink-2);
    padding: 7px 17px; border-radius: 100px;
    display: flex; align-items: center; gap: 7px; transition: all 0.15s ease;
  }
  .tab:hover { color: var(--ink); border-color: var(--line); }
  .tab.active { background: var(--ink); color: var(--bg); font-weight: 600; }
  .tab.active .cnt { color: var(--bg); opacity: 0.6; }
  .tab .sw { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .tab .cnt { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }

  /* ── 마소니 카드 — 보더리스, 이미지 퍼스트 ── */
  .cards { columns: 3 340px; column-gap: 22px; }
  .card {
    break-inside: avoid; margin-bottom: 40px;
    display: flex; flex-direction: column;
  }

  /* 무드 영역 — 이미지 업로드/URL 교체 가능 */
  .mood {
    aspect-ratio: 8 / 5; position: relative; display: flex; align-items: flex-end;
    overflow: hidden; border-radius: 16px;
    transition: transform 0.25s ease;
  }
  .card:hover .mood { transform: scale(1.012); }
  .mood img.mood-img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .mood .mood-label {
    position: absolute; top: 13px; left: 15px; z-index: 1;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
    color: rgba(255, 255, 255, 0.85); mix-blend-mode: difference;
  }
  .mood .mood-kw {
    position: relative; z-index: 1;
    font-family: var(--serif); font-style: italic; font-size: 22px;
    color: rgba(255, 255, 255, 0.92); mix-blend-mode: difference;
    padding: 0 15px 11px;
  }
  .mood-controls {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s ease;
  }
  .card:hover .mood-controls, .mood:focus-within .mood-controls { opacity: 1; }
  @media (hover: none) { .mood-controls { opacity: 1; } }
  .mbtn {
    background: rgba(10, 10, 11, 0.72); border: 1px solid rgba(255, 255, 255, 0.22);
    color: #F0EFEB; font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
    padding: 4px 11px; border-radius: 100px; cursor: pointer;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .mbtn:hover { background: rgba(10, 10, 11, 0.92); border-color: rgba(255, 255, 255, 0.5); }
  .mood.dragover { outline: 2px dashed rgba(255, 255, 255, 0.65); outline-offset: -8px; }
  .url-form { position: absolute; left: 10px; right: 10px; bottom: 10px; z-index: 3; display: flex; gap: 6px; }
  .url-form[hidden] { display: none; }
  .url-form input {
    flex: 1; min-width: 0; border: 1px solid rgba(255, 255, 255, 0.28); border-radius: 100px;
    background: rgba(10, 10, 11, 0.85); color: #F0EFEB; outline: 0;
    font-family: var(--mono); font-size: 11px; padding: 6px 13px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .url-form input:focus { border-color: rgba(255, 255, 255, 0.6); }

  /* 카드 본문 — 박스 없이 블랙 위에 직접 */
  .card-body { padding: 15px 4px 0; display: flex; flex-direction: column; gap: 13px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .mode-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
  }
  .mode-tag .sw { width: 7px; height: 7px; border-radius: 50%; }
  .card-head .btns { display: flex; gap: 6px; }
  .cbtn {
    border: 1px solid var(--line); background: transparent; cursor: pointer;
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-2);
    padding: 4px 12px; border-radius: 100px; transition: all 0.15s ease;
  }
  .cbtn:hover { border-color: rgba(240, 239, 235, 0.45); color: var(--ink); }
  .cbtn.done, .cbtn.saved { background: var(--ink); border-color: var(--ink); color: var(--bg); }

  .prompt {
    font-family: var(--mono); font-size: 12px; line-height: 1.8;
    color: var(--ink-2); overflow-x: auto; margin: 0;
  }
  .ko-toggle {
    align-self: flex-start; border: 0; background: transparent; cursor: pointer;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
    color: var(--ink-3); padding: 0; margin-top: -5px;
  }
  .ko-toggle:hover { color: var(--ink); }
  .prompt-ko {
    font-size: 13px; line-height: 1.75; color: var(--ink-2);
    border-left: 1px solid var(--line); padding-left: 13px; margin: -3px 0 0;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-family: var(--mono); font-size: 10.5px; padding: 3px 10px; border-radius: 100px;
    border: 1px solid var(--line-soft); color: var(--ink-3);
  }
  .tag.origin { border-color: var(--line); color: var(--ink-2); }

  /* AI 툴 궁합 */
  .tools { border-top: 1px solid var(--line-soft); padding-top: 12px; display: flex; flex-direction: column; gap: 7px; }
  .tools-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-3); }
  .tool-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .tool-name { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; }
  .fit-badge {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    padding: 1.5px 8px; border-radius: 100px;
    border: 1px solid var(--line); color: var(--ink-2);
  }
  .fit-badge.best { background: var(--ink); border-color: var(--ink); color: var(--bg); }
  .tool-why { font-size: 11.5px; color: var(--ink-3); }

  .spec { margin: 0; border-top: 1px solid var(--line-soft); padding-top: 12px; }
  .spec-row { display: grid; grid-template-columns: 88px 1fr; gap: 10px; padding: 3px 0; font-size: 12px; }
  .spec-row dt { color: var(--ink-3); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; padding-top: 1px; }
  .spec-row dd { margin: 0; color: var(--ink-2); }

  .saved-group-title {
    column-span: all; font-family: var(--serif); font-size: 20px; font-weight: 500;
    padding: 16px 0 16px; display: flex; align-items: baseline; gap: 10px;
  }
  .saved-group-title .en { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--ink-3); font-weight: 400; }
  .empty-saved { column-span: all; padding: 60px 0; text-align: center; color: var(--ink-3); font-size: 14px; }

  footer {
    margin-top: 96px; padding-top: 24px; border-top: 1px solid var(--line-soft);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 12px; color: var(--ink-3); line-height: 1.7;
  }
  footer .mono { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise 0.32s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  }
  @media (prefers-reduced-motion: reduce) {
    .card, .card:hover .mood { animation: none; transform: none; transition: none; }
  }
  :focus-visible { outline: 2px solid rgba(240, 239, 235, 0.6); outline-offset: 2px; }
</style>

<div class="wrap">
  <header>
    <div class="brand">
      <h1>결<em>gyeol</em></h1>
    </div>
    <span class="ver">MOOD → PROMPT · PROTOTYPE v0.4</span>
  </header>

  <section class="search-band">
    <p class="hero-line">느낌은 있는데,<br /><em>말이 안 나올 때.</em></p>
    <p class="hero-sub">무드의 결을 사진 · 타이포 · 영상 프롬프트로 번역합니다</p>
    <div class="search-row">
      <input id="kw-input" list="kw-list" placeholder="우아한, 반짝반짝, 쓸쓸한…" autocomplete="off" />
      <datalist id="kw-list"></datalist>
      <button id="kw-btn">번역</button>
    </div>
    <div class="chip-row" id="chip-row"></div>
    <div class="notfound" id="notfound" hidden></div>
  </section>

  <section id="result" hidden>
    <div class="result-head">
      <span class="kw" id="r-kw"></span>
      <div class="meta">
        <span class="en" id="r-en"></span>
        <span class="pos-badge" id="r-pos"></span>
      </div>
      <div class="exp-flow" id="exp-list"></div>
    </div>
    <nav class="tabs" id="tabs"></nav>
    <div class="cards" id="cards"></div>
  </section>
  <input type="file" id="file-input" accept="image/*" hidden />

  <footer>
    <span>프로토타입 — 키워드 10종 × 3모달 수동 큐레이션. 이미지는 업로드(자동 압축, 브라우저 저장) 또는 URL로 첨부. AI 툴 궁합은 실무 체감 기준 초깃값. 실서비스에서는 LLM이 임의 키워드를 실시간 번역·확장.</span>
    <span class="mono">GYEOL — MX STUDIO INTERNAL TOOL</span>
  </footer>
</div>

<script>
const MODES = {
  photo: { label: "PHOTO 사진",  color: "var(--m-photo)" },
  type:  { label: "TYPE 타이포", color: "var(--m-type)" },
  video: { label: "MOTION 영상", color: "var(--m-video)" },
};

/* 키워드별 무드 스와치 — 이미지 첨부 전 기본값 */
const GRADS = {
  "우아한":   "linear-gradient(135deg,#E9E2D5 0%,#CFC5B4 55%,#8F8574 100%)",
  "몽환적인": "linear-gradient(135deg,#C9B8E8 0%,#F2C9DC 50%,#9DB8E8 100%)",
  "강렬한":   "linear-gradient(135deg,#E33A2E 0%,#7A0E0E 60%,#141414 100%)",
  "아늑한":   "linear-gradient(135deg,#E8B36A 0%,#8A5A2E 60%,#3A2413 100%)",
  "차가운":   "linear-gradient(135deg,#BFD0DB 0%,#7A93A6 55%,#3E5566 100%)",
  "쓸쓸한":   "linear-gradient(135deg,#8C97A6 0%,#5A6473 55%,#2B3038 100%)",
  "반짝반짝": "radial-gradient(circle at 30% 30%,#F8E8A0 0%,#C9A227 45%,#101010 100%)",
  "폭신폭신": "linear-gradient(135deg,#F8E3E8 0%,#F3D9C4 50%,#E8D9F3 100%)",
  "아련한":   "linear-gradient(135deg,#E8CDA8 0%,#C4937A 55%,#6B4A3A 100%)",
  "쨍한":     "linear-gradient(90deg,#0057E7 0%,#0057E7 33%,#FFD500 33%,#FFD500 66%,#E3170A 66%,#E3170A 100%)",
};

/* AI 툴 궁합 — [툴, 최적|적합, 이유] */
const TOOLS = {
  "우아한:photo":   [["Midjourney", "최적", "필름 무드·질감 표현이 가장 깊다"], ["Seedream", "적합", "클린한 커머셜 인물컷"]],
  "우아한:type":    [["Ideogram", "최적", "세리프 글자 정확도 1위"], ["Recraft", "적합", "브랜드 워드마크 벡터"]],
  "우아한:video":   [["Veo 3", "최적", "시네마틱 롱테이크·라이팅"], ["Kling", "적합", "인물 모션이 자연스러움"]],
  "몽환적인:photo": [["Midjourney", "최적", "헤이즈·할레이션 묘사 독보적"], ["FLUX", "적합", "빛 번짐의 사실적 표현"]],
  "몽환적인:type":  [["Ideogram", "최적", "소프트 블러 레터링 지정 가능"], ["Midjourney", "적합", "무드 우선 타이포 스케치"]],
  "몽환적인:video": [["Runway", "최적", "글로우·스타일라이즈 그레이딩"], ["Seedance", "적합", "느린 플로팅 무브"]],
  "강렬한:photo":   [["Seedream", "최적", "고대비 커머셜 임팩트"], ["Midjourney", "적합", "레드/블랙 무드 연출"]],
  "강렬한:type":    [["Ideogram", "최적", "올캡스 헤드라인 정확도"], ["Recraft", "적합", "포스터 그래픽 벡터"]],
  "강렬한:video":   [["Seedance", "최적", "빠른 컷·다이내믹 모션"], ["Kling", "적합", "액션 물리 표현"]],
  "아늑한:photo":   [["Midjourney", "최적", "필름 그레인·웜톤 감성"], ["FLUX", "적합", "실내 조명 리얼리즘"]],
  "아늑한:type":    [["Ideogram", "최적", "북 타이포그래피 재현"], ["Recraft", "적합", "따뜻한 편집 레이아웃"]],
  "아늑한:video":   [["Veo 3", "최적", "실내 라이팅 리얼리즘 + 룸톤 오디오"], ["Kling", "적합", "잔잔한 생활 모션"]],
  "차가운:photo":   [["FLUX", "최적", "미니멀 프로덕트 정밀 묘사"], ["Seedream", "적합", "클린 커머셜 스틸"]],
  "차가운:type":    [["Recraft", "최적", "클리니컬 그리드·벡터 정밀"], ["Ideogram", "적합", "마이크로 캡션 정확도"]],
  "차가운:video":   [["Veo 3", "최적", "정적 시네마틱 와이드"], ["Runway", "적합", "틸 그레이딩 컨트롤"]],

let curIdx = 0;
let curTab = "all"; // all | photo | type | video | saved
let saved = [];
try { saved = JSON.parse(localStorage.getItem("gyeol-saved") || "[]"); } catch (e) { saved = []; }

function persistSaved() {
  try { localStorage.setItem("gyeol-saved", JSON.stringify(saved)); } catch (e) {}
}

/* 카드별 첨부 이미지 — { "키워드:모달": {type:"url"|"data", src} } */
let media = {};
try { media = JSON.parse(localStorage.getItem("gyeol-media") || "{}"); } catch (e) { media = {}; }

function persistMedia() {
  try { localStorage.setItem("gyeol-media", JSON.stringify(media)); return true; }
  catch (e) { return false; } // 용량 초과 등
}

const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

/* ── 렌더 ─────────────────────────── */
function renderChips() {
  const row = $("chip-row");
  row.querySelectorAll(".chip").forEach((c) => c.remove());
  DICT.forEach((d, i) => {
    const b = document.createElement("button");
    b.className = "chip" + (i === curIdx && curTab !== "saved" ? " active" : "");
    b.innerHTML = esc(d.kw) + (d.pos !== "형용사" ? '<span class="t">' + esc(d.pos) + "</span>" : "");
    b.onclick = () => { loadKeyword(i); };
    row.appendChild(b);
  });
  const dl = $("kw-list");
  dl.innerHTML = DICT.map((d) => '<option value="' + esc(d.kw) + '">').join("");
}

function renderTabs() {
  const defs = [
    ["all", null, "전체", null],
    ["photo", MODES.photo.color, "사진", null],
    ["type", MODES.type.color, "타이포", null],
    ["video", MODES.video.color, "영상", null],
    ["saved", null, "보관함", saved.length],
  ];
  $("tabs").innerHTML = defs.map(([key, color, label, cnt]) =>
    '<button class="tab' + (curTab === key ? " active" : "") + '" data-tab="' + key + '">' +
    (color ? '<span class="sw" style="background:' + color + '"></span>' : "") +
    esc(label) +
    (cnt !== null ? ' <span class="cnt">' + cnt + "</span>" : "") +
    "</button>"
  ).join("");
  $("tabs").querySelectorAll(".tab").forEach((t) => {
    t.onclick = () => { curTab = t.dataset.tab; render(); };
  });
}

function toolsHTML(d, modeKey) {
  const list = TOOLS[d.kw + ":" + modeKey];
  if (!list) return "";
  return (
    '<div class="tools"><span class="tools-lbl">AI TOOL FIT — 이 무드가 잘 나오는 툴</span>' +
    list.map(([name, fit, why]) =>
      '<div class="tool-row"><span class="tool-name">' + esc(name) + "</span>" +
      '<span class="fit-badge' + (fit === "최적" ? " best" : "") + '">' + esc(fit) + "</span>" +
      '<span class="tool-why">' + esc(why) + "</span></div>"
    ).join("") +
    "</div>"
  );
}

function moodHTML(d, modeKey) {
  const id = d.kw + ":" + modeKey;
  const m = media[id];
  return (
    '<div class="mood" data-mid="' + esc(id) + '" style="background:' + (GRADS[d.kw] || "var(--surface)") + '">' +
      (m ? '<img class="mood-img" src="' + esc(m.src) + '" alt="' + esc(d.kw) + ' 무드 이미지" onerror="this.remove()" />' : "") +
      '<span class="mood-label">' + (m ? "MOOD" : "MOOD — 드래그 · 업로드 · URL로 이미지 추가") + "</span>" +
      '<span class="mood-kw">' + esc(d.kw) + "</span>" +
      '<div class="mood-controls">' +
        '<button class="mbtn up-btn">업로드</button>' +
        '<button class="mbtn url-btn">URL</button>' +
        (m ? '<button class="mbtn rm-btn">제거</button>' : "") +
      "</div>" +
      '<div class="url-form" hidden><input type="text" placeholder="https:// 이미지 주소 붙여넣기" /><button class="mbtn apply-btn">적용</button></div>' +
    "</div>"
  );
}

function cardHTML(d, modeKey, idxInDict) {
  const m = MODES[modeKey];
  const md = d.modes[modeKey];
  const id = idxInDict + ":" + modeKey;
  const isSaved = saved.includes(id);
  return (
    '<article class="card">' +
      moodHTML(d, modeKey) +
      '<div class="card-body">' +
        '<div class="card-head">' +
          '<span class="mode-tag" style="color:' + m.color + '"><span class="sw" style="background:' + m.color + '"></span>' + esc(m.label) + "</span>" +
          '<div class="btns">' +
            '<button class="cbtn save-btn' + (isSaved ? " saved" : "") + '" data-id="' + id + '">' + (isSaved ? "저장됨" : "저장") + "</button>" +
            '<button class="cbtn copy-btn" data-prompt="' + esc(md.prompt) + '">복사</button>' +
          "</div>" +
        "</div>" +
        '<p class="prompt">' + esc(md.prompt) + "</p>" +
        '<button class="ko-toggle">한국어 번역 ▾</button>' +
        '<p class="prompt-ko" hidden>' + esc(md.ko) + "</p>" +
        '<div class="tags">' +
          '<span class="tag origin">#원본-' + esc(d.kw) + "</span>" +
          md.tags.map((t) => '<span class="tag">#' + esc(t) + "</span>").join("") +
        "</div>" +
        toolsHTML(d, modeKey) +
        '<dl class="spec">' +
          md.spec.map(([k, v]) => '<div class="spec-row"><dt>' + esc(k) + "</dt><dd>" + esc(v) + "</dd></div>").join("") +
        "</dl>" +
      "</div>" +
    "</article>"
  );
}

/* ── 카드 인터랙션 ─────────────────── */
let pendingMediaId = null;

function bindCardButtons(container) {
  container.querySelectorAll(".copy-btn").forEach((b) => {
    b.onclick = () => {
      const text = b.dataset.prompt;
      const done = () => { b.textContent = "복사됨"; b.classList.add("done"); setTimeout(() => { b.textContent = "복사"; b.classList.remove("done"); }, 1500); };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
      } else fallbackCopy(text, done);
    };
  });
  container.querySelectorAll(".save-btn").forEach((b) => {
    b.onclick = () => {
      const id = b.dataset.id;
      const i = saved.indexOf(id);
      if (i >= 0) saved.splice(i, 1); else saved.push(id);
      persistSaved();
      render();
    };
  });
  container.querySelectorAll(".ko-toggle").forEach((b) => {
    b.onclick = () => {
      const ko = b.nextElementSibling;
      ko.hidden = !ko.hidden;
      b.textContent = ko.hidden ? "한국어 번역 ▾" : "한국어 번역 ▴";
    };
  });
  container.querySelectorAll(".mood").forEach((mood) => {
    const id = mood.dataset.mid;
    const urlForm = mood.querySelector(".url-form");
    const urlInput = urlForm.querySelector("input");

    mood.querySelector(".up-btn").onclick = () => { pendingMediaId = id; $("file-input").click(); };
    mood.querySelector(".url-btn").onclick = () => { urlForm.hidden = false; urlInput.focus(); };
    const rm = mood.querySelector(".rm-btn");
    if (rm) rm.onclick = () => { delete media[id]; persistMedia(); render(); };

    const applyUrl = () => {
      const u = urlInput.value.trim();
      if (!u) { urlForm.hidden = true; return; }
      media[id] = { type: "url", src: u };
      persistMedia();
      render();
    };
    urlForm.querySelector(".apply-btn").onclick = applyUrl;
    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applyUrl();
      if (e.key === "Escape") urlForm.hidden = true;
    });

    mood.addEventListener("dragover", (e) => { e.preventDefault(); mood.classList.add("dragover"); });
    mood.addEventListener("dragleave", () => mood.classList.remove("dragover"));
    mood.addEventListener("drop", (e) => {
      e.preventDefault();
      mood.classList.remove("dragover");
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f && f.type.startsWith("image/")) attachFile(f, id);
    });
  });
}

$("file-input").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f && pendingMediaId) attachFile(f, pendingMediaId);
  e.target.value = "";
});

/* 파일 → 캔버스 리사이즈 → dataURL 저장 (localStorage 부담 최소화) */
function attachFile(file, id) {
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1000;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      media[id] = { type: "data", src: cv.toDataURL("image/jpeg", 0.82) };
      if (!persistMedia()) {
        delete media[id];
        const nf = $("notfound");
        nf.hidden = false;
        nf.textContent = "브라우저 저장 공간이 가득 찼습니다. 다른 카드의 이미지를 제거하거나 더 작은 이미지를 사용해 주세요.";
        return;
      }
      render();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); done(); } catch (e) {}
  document.body.removeChild(ta);
}

function render() {
  renderChips();
  renderTabs();
  const result = $("result");
  result.hidden = false;
  const cards = $("cards");

  if (curTab === "saved") {
    $("r-kw").textContent = "보관함";
    $("r-en").textContent = "saved prompts";
    $("r-pos").hidden = true;
    $("exp-list").innerHTML = "";
    if (!saved.length) {
      cards.innerHTML = '<div class="empty-saved">저장된 프롬프트가 없습니다. 카드의 [저장] 버튼으로 팀 라이브러리를 만들어 보세요.</div>';
      return;
    }
    let html = "";
    const byKw = {};
    saved.forEach((id) => {
      const [i, mode] = id.split(":");
      (byKw[i] = byKw[i] || []).push(mode);
    });
    Object.keys(byKw).forEach((i) => {
      const d = DICT[+i];
      if (!d) return;
      html += '<div class="saved-group-title">' + esc(d.kw) + '<span class="en">' + esc(d.en) + "</span></div>";
      byKw[i].forEach((mode) => { html += cardHTML(d, mode, +i); });
    });
    cards.innerHTML = html;
    bindCardButtons(cards);
    return;
  }

  const d = DICT[curIdx];
  $("r-kw").textContent = d.kw;
  $("r-en").textContent = d.en;
  const pos = $("r-pos");
  pos.hidden = false;
  pos.textContent = d.pos;
  pos.className = "pos-badge" + (d.pos !== "형용사" ? " onomat" : "");

  $("exp-list").innerHTML = d.exp.map((e) =>
    '<div class="exp-item"><span class="ko">' + esc(e.ko) + "</span>" +
    (e.t ? '<span class="tbadge">' + esc(e.t) + "</span>" : "") +
    '<div class="en">' + esc(e.en) + "</div></div>"
  ).join("");

  const modeKeys = curTab === "all" ? Object.keys(MODES) : [curTab];
  cards.innerHTML = modeKeys.map((mk) => cardHTML(d, mk, curIdx)).join("");
  bindCardButtons(cards);
}

function loadKeyword(i) {
  curIdx = i;
  if (curTab === "saved") curTab = "all";
  $("notfound").hidden = true;
  $("kw-input").value = DICT[i].kw;
  render();
  $("result").scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ── 검색 ─────────────────────────── */
function search() {
  const q = $("kw-input").value.trim();
  if (!q) return;
  const exact = DICT.findIndex((d) => d.kw === q);
  if (exact >= 0) return loadKeyword(exact);
  const partial = DICT.findIndex((d) =>
    d.kw.includes(q) || q.includes(d.kw) ||
    d.exp.some((e) => e.ko.includes(q)) || d.en.includes(q.toLowerCase())
  );
  if (partial >= 0) return loadKeyword(partial);
  const nf = $("notfound");
  nf.hidden = false;
  nf.innerHTML = "<strong>“" + esc(q) + "”</strong>는 프로토타입 사전에 아직 없습니다. 실서비스에서는 LLM이 실시간으로 번역·확장합니다. 지금은 수록 키워드로 흐름을 확인해 보세요.";
}

$("kw-btn").onclick = search;
$("kw-input").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });

render();
</script>
</body>
</html>
